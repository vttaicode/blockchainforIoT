version: "3.8"

services:
  # ============================================
  # FastAPI Server (IoT Data + Blockchain API)
  # ============================================
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: iot-server
    ports:
      - "8000:8000"
    volumes:
      # Persist IoT payload data on host
      - ./iot_payloads.json:/app/iot_payloads.json
      # Mount Fabric crypto materials & binaries from host (Kali Linux)
      - ~/fabric-samples:/root/fabric-samples:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - FABRIC_HOST=host.docker.internal
    networks:
      - iot-net
    restart: unless-stopped

  # ============================================
  # IoT Sensor Simulator
  # ============================================
  sensor:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    container_name: iot-sensor
    environment:
      - SERVER_URL=http://server:8000/data
      - DEVICE_ID=sensor_docker_1
      - PYTHONUNBUFFERED=1
    depends_on:
      - server
    networks:
      - iot-net
    restart: unless-stopped

networks:
  iot-net:
    driver: bridge
